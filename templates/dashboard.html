<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .header {
            background: #ff7f50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 30px;
        }

        .card-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h2 {
            margin: 10px 0;
            color: #ff7f50;
        }

        .btn-container {
            margin-top: 30px;
        }

        .btn {
            padding: 10px 20px;
            background: #ff7f50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-right: 10px;
        }

        .btn:hover {
            background: #ff6333;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Your Dashboard</h1>
</div>

<div class="container">

    <div class="card-container">
        <div class="card">
            <h3>Total Entries</h3>
            <h2>{{ total_entries or 0 }}</h2>
        </div>

        <div class="card">
            <h3>Avg Sleep</h3>
            <h2>{{ avg_sleep or 0 }} hrs</h2>
        </div>

        <div class="card">
            <h3>Avg Water</h3>
            <h2>{{ avg_water or 0 }} L</h2>
        </div>

        <div class="card">
            <h3>Avg Pimples</h3>
            <h2>{{ avg_pimples or 0 }}</h2>
        </div>
    </div>

    <div class="btn-container">
        <a href="/skin_pattern" class="btn">Add Entry</a>
        <a href="/view_skin_data" class="btn">View Data</a>
        <a href="/" class="btn">Go Home</a>
    </div>

</div>

</body>
</html>
